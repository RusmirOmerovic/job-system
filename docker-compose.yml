services:
  db:
    image: postgres:16
    container_name: job-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: jobs
    ports:
      - "5432:5432"
    volumes:
      - job_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d jobs"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: job-api
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  job_db_data:
